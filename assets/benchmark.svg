<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-label="Live A/B test results: coached versus baseline across 12 real sessions. Tokens dropped 45 percent from 133,146 to 72,834. Turns dropped 44 percent from 4.5 to 2.5. Task correctness rose from 4 of 6 to 6 of 6.">
  <title>Live A/B: coached vs baseline (12 real sessions)</title>
  <desc>Three paired-bar results in retro pixel style. Tokens: baseline 133,146 vs coached 72,834 (-45%). Turns: baseline 4.5 vs coached 2.5 (-44%). Correctness: baseline 4 of 6 vs coached 6 of 6. Caveat: N=6 per arm, one task, one model, token-first.</desc>

  <rect x="0" y="0" width="760" height="360" fill="#0f380f"/>
  <rect x="8" y="8" width="744" height="344" fill="#0f380f" stroke="#9bbc0f" stroke-width="4"/>
  <rect x="20" y="20" width="720" height="320" fill="#8bac0f"/>
  <rect x="20" y="20" width="720" height="320" fill="none" stroke="#306230" stroke-width="4"/>

  <rect x="20" y="20" width="720" height="44" fill="#306230"/>
  <text x="38" y="50" font-family="'Courier New',monospace" font-size="21" font-weight="bold" fill="#e0f8d0" letter-spacing="1">LIVE A/B: COACHED vs BASELINE</text>
  <text x="700" y="50" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#9bbc0f" text-anchor="end">12 REAL SESSIONS</text>

  <rect x="372" y="76" width="14" height="14" fill="#0f380f"/>
  <text x="392" y="88" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0f380f">BASELINE</text>
  <rect x="500" y="76" width="14" height="14" fill="#306230"/>
  <text x="520" y="88" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0f380f">COACHED</text>

  <g>
    <rect x="650" y="74" width="8" height="6" fill="#0f380f"/>
    <rect x="646" y="80" width="16" height="6" fill="#0f380f"/>
    <rect x="630" y="86" width="48" height="36" fill="#306230"/>
    <rect x="630" y="86" width="48" height="36" fill="none" stroke="#0f380f" stroke-width="3"/>
    <rect x="640" y="96" width="10" height="10" fill="#e0f8d0"/>
    <rect x="658" y="96" width="10" height="10" fill="#e0f8d0"/>
    <rect x="643" y="99" width="5" height="5" fill="#0f380f"/>
    <rect x="661" y="99" width="5" height="5" fill="#0f380f"/>
    <rect x="640" y="113" width="28" height="4" fill="#9bbc0f"/>
  </g>

  <rect x="40" y="278" width="700" height="4" fill="#0f380f"/>

  <rect x="70" y="146" width="56" height="132" fill="#0f380f"/>
  <text x="98" y="138" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0f380f" text-anchor="middle">133,146</text>
  <rect x="134" y="206" width="56" height="72" fill="#306230"/>
  <text x="162" y="198" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0f380f" text-anchor="middle">72,834</text>
  <text x="130" y="300" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#0f380f" text-anchor="middle">TOKENS</text>
  <rect x="100" y="306" width="60" height="18" fill="#0f380f"/>
  <text x="130" y="319" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#e0f8d0" text-anchor="middle">-45%</text>

  <rect x="320" y="146" width="56" height="132" fill="#0f380f"/>
  <text x="348" y="138" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0f380f" text-anchor="middle">4.5</text>
  <rect x="384" y="205" width="56" height="73" fill="#306230"/>
  <text x="412" y="197" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0f380f" text-anchor="middle">2.5</text>
  <text x="380" y="300" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#0f380f" text-anchor="middle">TURNS</text>
  <rect x="350" y="306" width="60" height="18" fill="#0f380f"/>
  <text x="380" y="319" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#e0f8d0" text-anchor="middle">-44%</text>

  <rect x="570" y="190" width="56" height="88" fill="#0f380f"/>
  <text x="598" y="182" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0f380f" text-anchor="middle">4/6</text>
  <rect x="634" y="146" width="56" height="132" fill="#306230"/>
  <text x="662" y="138" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0f380f" text-anchor="middle">6/6</text>
  <text x="630" y="300" font-family="'Courier New',monospace" font-size="15" font-weight="bold" fill="#0f380f" text-anchor="middle">CORRECTNESS</text>
  <rect x="588" y="306" width="84" height="18" fill="#306230"/>
  <text x="630" y="319" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#e0f8d0" text-anchor="middle">+2 solved</text>

  <rect x="20" y="324" width="720" height="16" fill="#306230"/>
  <text x="380" y="336" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#e0f8d0" text-anchor="middle" letter-spacing="1">N=6/arm  .  one task  .  one model  .  token-first</text>
</svg>
